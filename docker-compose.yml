services:
  db:
    image: mysql:8.0
    container_name: alexandria_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: AlexandriaUnburnt
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./AlexandriaUnburnt.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: alexandria_backend
    restart: unless-stopped
    ports:
      - "8800:8800"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      DB_NAME: AlexandriaUnburnt
      PORT: "8800"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: alexandria_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8800

volumes:
  db_data:
